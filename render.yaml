services:
  # ── Python InsureScan Engine (OCR + EMR + Premium) ────────────────────────
  - type: web
    name: aegisai-flask-scanner
    runtime: python
    rootDir: insurance_scanner
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 180 --workers 1
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9      # Pinned — EasyOCR/PyTorch not yet compatible with 3.14

  # ── Node.js Express Backend ──────────────────────────────────────────────
  - type: web
    name: aegisai-node-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    envVars:
      - key: FLASK_SCANNER_URL
        fromService:
          type: web
          name: aegisai-flask-scanner
          property: host          # Render auto-injects the Flask service's URL
