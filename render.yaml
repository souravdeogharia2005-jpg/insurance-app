services:
  # ── Python InsureScan Engine (OCR + EMR + Premium) ────────────────────────
  - type: web
    name: aegisai-flask-scanner
    runtime: docker
    rootDir: insurance_scanner
    plan: starter
    envVars:
      - key: PORT
        value: 5050

  # ── Node.js Express Backend ──────────────────────────────────────────────
  - type: web
    name: aegisai-node-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    plan: starter
    envVars:
      - key: FLASK_SCANNER_URL
        fromService:
          type: web
          name: aegisai-flask-scanner
          property: host          # Render auto-injects the Flask service's URL
