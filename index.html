<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AegisAI - Smart Insurance Platform</title>
  <meta name="description"
    content="AI-powered insurance proposal management with instant EMR calculations, risk assessment, and document scanning.">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">

  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/styles.css">

  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- SheetJS for Excel/CSV export -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%234f46e5'/><text x='50' y='65' font-family='Inter,sans-serif' font-weight='800' font-size='36' text-anchor='middle' fill='white'>Ae</text></svg>">
</head>

<body>

  <!-- Loading Screen -->
  <div class="loading-screen" id="loading-screen">
    <svg class="loader-svg" viewBox="0 0 100 100" width="100" height="100">
      <circle class="loader-circle loader-circle-outer" cx="50" cy="50" r="43"></circle>
      <circle class="loader-circle loader-circle-middle" cx="50" cy="50" r="30"></circle>
      <circle class="loader-circle loader-circle-inner" cx="50" cy="50" r="17"></circle>
    </svg>
    <div class="loading-text">AegisAI...</div>
  </div>

  <!-- Desktop Navigation (3 sections: Logo | Links | Actions) -->
  <nav class="floating-navbar" id="desktop-nav">
    <!-- Section 1: Logo -->
    <div class="nav-section-logo" style="cursor:pointer;" onclick="navigateTo('home')">
      <div class="nav-logo-icon"><i class="ri-shield-star-fill"></i></div>
      <span class="nav-logo-text">Aegis<span>AI</span></span>
    </div>

    <!-- Section 2: Navigation Links -->
    <div class="nav-section-links">
      <button class="nav-link active" data-page="home" onclick="navigateTo('home')">
        <i class="ri-home-5-line"></i> <span data-i18n="home">Home</span>
      </button>
      <button class="nav-link" data-page="proposal" onclick="navigateTo('proposal')">
        <i class="ri-file-add-line"></i> <span data-i18n="newProposal">New Proposal</span>
      </button>
      <button class="nav-link" data-page="dashboard" onclick="navigateTo('dashboard')">
        <i class="ri-dashboard-3-line"></i> <span data-i18n="dashboard">Dashboard</span>
      </button>
      <button class="nav-link" data-page="scan" onclick="navigateTo('scan')">
        <i class="ri-scan-2-line"></i> <span data-i18n="scan">Scan</span>
      </button>
      <button class="nav-link" data-page="admin" onclick="navigateTo('admin')">
        <i class="ri-settings-3-line"></i> <span data-i18n="admin">Admin</span>
      </button>
    </div>

    <!-- Section 3: Theme + Settings -->
    <div class="nav-section-actions">
      <button class="nav-btn" onclick="toggleTheme()" title="Toggle theme">
        <i class="ri-moon-line theme-icon-el"></i>
      </button>
      <button class="nav-btn nav-btn-settings" onclick="toggleSettings()" title="Settings">
        <i class="ri-equalizer-line"></i>
      </button>
      <!-- Settings Panel -->
      <div class="settings-panel" id="settings-panel">
        <h4><i class="ri-settings-3-line"></i> Settings</h4>
        <div class="settings-group">
          <label>Currency</label>
          <select class="settings-select" onchange="setCurrency(this.value)">
            <option value="INR" selected>₹ INR (Indian Rupee)</option>
            <option value="USD">$ USD (US Dollar)</option>
            <option value="EUR">€ EUR (Euro)</option>
            <option value="GBP">£ GBP (British Pound)</option>
          </select>
        </div>
        <div class="settings-group" style="margin-bottom:0;">
          <label>Language</label>
          <select class="settings-select" onchange="setLanguage(this.value)">
            <option value="en" selected>English</option>
            <option value="hi">हिंदी (Hindi)</option>
          </select>
        </div>
      </div>
    </div>
  </nav>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav" id="mobile-nav">
    <div class="mobile-nav-inner">
      <button class="mobile-nav-item active" data-page="home" onclick="navigateTo('home')">
        <i class="ri-home-5-line"></i><span data-i18n="home">Home</span>
      </button>
      <button class="mobile-nav-item" data-page="proposal" onclick="navigateTo('proposal')">
        <i class="ri-file-add-line"></i><span>Proposal</span>
      </button>
      <button class="mobile-nav-item" data-page="dashboard" onclick="navigateTo('dashboard')">
        <i class="ri-dashboard-3-line"></i><span>Dashboard</span>
      </button>
      <button class="mobile-nav-item" data-page="scan" onclick="navigateTo('scan')">
        <i class="ri-scan-2-line"></i><span>Scan</span>
      </button>
      <button class="mobile-nav-item" data-page="admin" onclick="navigateTo('admin')">
        <i class="ri-settings-3-line"></i><span>Admin</span>
      </button>
      <button class="mobile-nav-item" onclick="toggleTheme()">
        <i class="ri-moon-line theme-icon-el"></i><span>Theme</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="page-content" class="page-container"></main>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script src="js/home.js"></script>
  <script src="js/proposal.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/scan.js"></script>
  <script src="js/admin.js"></script>

  <script>
    // Initialize settings selects from saved state
    window.addEventListener('load', () => {
      setTimeout(() => {
        const curSel = document.querySelector('.settings-panel select[onchange*="setCurrency"]');
        if (curSel) curSel.value = AppState.currency;
        const langSel = document.querySelector('.settings-panel select[onchange*="setLanguage"]');
        if (langSel) langSel.value = AppState.language;
      }, 2200);
    });
  </script>
</body>

</html>
